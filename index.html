<title>Iron Protocol</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,sans-serif;background:#fff;color:#1a1a1a;max-width:540px;margin:0 auto;padding:env(safe-area-inset-top,12px) 16px calc(env(safe-area-inset-bottom,12px) + 12px);overscroll-behavior:none}
.mono{font-family:'DM Mono',monospace}
.header{text-align:center;margin-bottom:20px;padding-top:8px}
.header h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.header p{font-size:12px;color:#999}
.nav{display:flex;gap:0;margin-bottom:18px;border-bottom:1.5px solid #e8e8e8}
.nav button{flex:1;padding:9px 0;font-size:11px;font-weight:400;font-family:'DM Sans',sans-serif;color:#bbb;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;text-transform:uppercase;letter-spacing:0.5px;transition:all .15s}
.nav button.active{font-weight:600;color:#1a1a1a;border-bottom-color:#1a1a1a}
.weeks{display:flex;gap:6px;margin-bottom:14px}
.weeks button{flex:1;padding:7px 0;font-size:11px;font-weight:400;font-family:'DM Mono',monospace;background:#f5f5f3;color:#999;border:none;border-radius:6px;cursor:pointer;transition:all .15s}
.weeks button.active{background:#1a1a1a;color:#fff;font-weight:600}
.progress-bar{margin-bottom:18px}
.progress-bar .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.progress-bar .track{height:5px;background:#f0eeeb;border-radius:3px;overflow:hidden}
.progress-bar .fill{height:100%;border-radius:3px;transition:width .4s ease}
.days{display:flex;gap:4px;margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.days button{flex:0 0 auto;padding:8px 10px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:400;background:transparent;color:#aaa;border:0.5px solid transparent;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap;text-align:center;line-height:1.3}
.days button.active{background:#f5f5f3;font-weight:600;color:#1a1a1a;border-color:#e0e0e0}
.days button.done{color:#2d8a4e}
.warmup{background:#faf9f7;border-radius:8px;padding:9px 12px;margin-bottom:14px;font-size:13px;color:#888;border-left:3px solid #e0ddd8}
.warmup .label{font-weight:600;color:#bbb;font-size:9px;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:2px}
.block{margin-bottom:18px}
.block-title{font-size:10px;font-weight:600;color:#ccc;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:6px;font-family:'DM Mono',monospace}
.exercise{display:flex;gap:10px;align-items:flex-start;padding:9px 0;cursor:pointer;transition:opacity .2s}
.exercise.checked{opacity:0.4}
.exercise+.exercise{border-top:0.5px solid #f0eeeb}
.checkbox{width:20px;height:20px;border-radius:5px;border:1.5px solid #ddd;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.checkbox.on{border:none;background:#1a1a1a}
.ex-body{flex:1;min-width:0}
.ex-top{display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap}
.ex-name{font-size:14px;font-weight:500}
.ex-name.struck{text-decoration:line-through}
.ex-right{display:flex;gap:6px;align-items:center}
.ex-sets{font-size:11px;color:#bbb;flex-shrink:0;font-family:'DM Mono',monospace}
.ex-note{font-size:12px;color:#b0a99f;margin-top:2px}
.wt-btn{background:transparent;border:1px dashed #ddd;border-radius:4px;padding:2px 8px;font-size:11px;font-family:'DM Mono',monospace;color:#ccc;cursor:pointer;white-space:nowrap}
.wt-btn.has{background:#f0eeeb;border:none;color:#1a1a1a}
.wt-input{width:52px;padding:3px 6px;font-size:12px;font-family:'DM Mono',monospace;border:1.5px solid #1a1a1a;border-radius:4px;background:#faf9f7;text-align:center;outline:none}
.finisher{background:#1a1a1a;color:#fff;border-radius:8px;padding:11px 14px;font-size:13px;margin-bottom:14px}
.finisher .label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:#666;display:block;margin-bottom:2px}
.reset-btn{width:100%;padding:9px;font-size:11px;font-family:'DM Mono',monospace;background:none;border:0.5px solid #e8e8e8;border-radius:6px;color:#ccc;cursor:pointer;margin-top:6px}
.timer-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;color:#fff;padding:12px 16px calc(env(safe-area-inset-bottom,12px) + 12px);z-index:100}
.timer-bar .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.timer-bar .display{font-size:32px;font-weight:700;font-family:'DM Mono',monospace;text-align:center;margin:4px 0 8px}
.timer-bar .track{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.timer-bar .fill{height:100%;border-radius:2px;transition:width 1s linear}
.timer-btn{background:rgba(255,255,255,0.1);border:none;color:#fff;padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Mono',monospace}
.timer-btn.skip{color:#888}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:#faf9f7;border-radius:6px;padding:9px 11px}
.stat-card .label{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:0.3px;font-family:'DM Mono',monospace}
.stat-card .val{font-size:17px;font-weight:600;color:#1a1a1a;margin:2px 0}
.stat-card .sub{font-size:10px;color:#ccc}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.stat3 .item{background:#faf9f7;border-radius:6px;padding:10px;text-align:center}
.stat3 .item .num{font-size:18px;font-weight:700;color:#1a1a1a}
.stat3 .item .lbl{font-size:10px;color:#aaa;font-family:'DM Mono',monospace}
.log-input{display:flex;gap:8px;align-items:center;margin-top:12px}
.log-input input{flex:1;padding:8px 12px;font-size:16px;font-family:'DM Mono',monospace;border:1.5px solid #ddd;border-radius:6px;background:#fff;outline:none}
.log-btn{padding:8px 16px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;background:#1a1a1a;color:#fff;border:none;border-radius:6px;cursor:pointer}
h3{font-size:14px;font-weight:600;color:#1a1a1a;margin:0 0 8px}
.prose{margin:0 0 10px;color:#666;font-size:14px;line-height:1.7}
.meal{padding:7px 0;border-bottom:0.5px solid #f0eeeb}
.meal:last-child{border-bottom:none}
.meal .name{font-size:11px;font-weight:600;color:#aaa;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.3px}
.meal .desc{font-size:13px;color:#555;margin-top:2px}
.dark-box{background:#1a1a1a;border-radius:8px;padding:14px;color:#ccc;font-size:13px;margin-bottom:20px}
.dark-box strong{font-weight:600;color:#fff}
.prog-row{padding:7px 0;border-bottom:0.5px solid #f0eeeb}
.prog-row:last-child{border-bottom:none}
.prog-row .rule{font-size:11px;font-weight:600;color:#aaa;font-family:'DM Mono',monospace}
.prog-row .detail{font-size:13px;color:#555;margin-top:2px}
.rest-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.rest-card{background:#faf9f7;border-radius:6px;padding:10px;text-align:center}
.rest-card .time{font-size:18px;font-weight:700;color:#1a1a1a}
.rest-card .type{font-size:10px;font-weight:600;color:#bbb;font-family:'DM Mono',monospace}
.rest-card .note{font-size:9px;color:#ddd}
.history-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid #f0eeeb;font-size:13px}
.empty{text-align:center;padding:2rem 1rem;color:#ccc}
.empty .icon{font-size:32px;margin-bottom:8px}
.empty p{font-size:13px}
.section{display:none}
.section.active{display:block}
.bg-section{background:#faf9f7;border-radius:8px;padding:16px;margin-bottom:20px}
.bg-section .stitle{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
</style>
</head>

{title:"Superset A — 4 rounds, 75s rest",rest:75,exercises:[{name:"Cable wide-grip pulldown",sets:"4×8-10",note:"Heavier this week, strict form"},{name:"DB Zottman curl",sets:"4×10",note:"Curl palms up, lower palms down"}]},
{title:"Superset B — 3 rounds, 60s rest",rest:60,exercises:[{name:"Cable seated row (wide grip)",sets:"3×10-12",note:"Lat bar attachment"},{name:"Cable rope curl",sets:"3×12",note:"Slow eccentric (3s down)"}]},
{title:"Superset C — 3 rounds, 60s rest",rest:60,exercises:[{name:"Cable rear delt fly",sets:"3×15",note:"Highest weight you can control"},{name:"Cable tricep kickback",sets:"3×12/arm",note:"Lock elbow, extend fully"}]},
{title:"Core finisher — 2 rounds",rest:0,exercises:[{name:"Cable crunch",sets:"15"},{name:"Side plank",sets:"30s/side"}]}
]}
]}
]};

let state={week:0,day:0,view:"workout",checked:{},weights:{},bodyLog:[]};
let timerState=null,timerInterval=null,audioCtx=null;

function load(){try{const d=localStorage.getItem("iron-protocol-v3");if(d){const p=JSON.parse(d);state.checked=p.checked||{};state.weights=p.weights||{};state.bodyLog=p.bodyLog||[];}}catch{}}
function save(){try{localStorage.setItem("iron-protocol-v3",JSON.stringify({checked:state.checked,weights:state.weights,bodyLog:state.bodyLog}));}catch{}}

function beep(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.15,.3].forEach(d=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=880;g.gain.setValueAtTime(.3,audioCtx.currentTime+d);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+d+.12);o.start(audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d+.12);});
  }catch{}
}

function startTimer(seconds){
  stopTimer();
  timerState={total:seconds,left:seconds,running:true};
  renderTimer();
  timerInterval=setInterval(()=>{
    if(!timerState||!timerState.running)return;
    timerState.left--;
    if(timerState.left<=0){timerState.left=0;timerState.running=false;beep();setTimeout(stopTimer,1500);}
    renderTimer();
  },1000);
}
function stopTimer(){if(timerInterval)clearInterval(timerInterval);timerState=null;document.getElementById("timer-container").innerHTML="";}

function renderTimer(){
  if(!timerState){document.getElementById("timer-container").innerHTML="";return;}
  const t=timerState,m=Math.floor(t.left/60),s=t.left%60,pct=t.total>0?((t.total-t.left)/t.total)*100:100;
  document.getElementById("timer-container").innerHTML=`
    <div class="timer-bar">
      <div class="top">
        <span class="mono" style="font-size:12px;color:#999;text-transform:uppercase;letter-spacing:0.5px">${t.left===0?"Time's up — go!":"Rest timer"}</span>
        <div style="display:flex;gap:8px">
          <button class="timer-btn" onclick="timerState.running=!timerState.running">${t.running?"Pause":"Resume"}</button>
          <button class="timer-btn skip" onclick="stopTimer()">Skip</button>
        </div>
      </div>
      <div class="display">${m}:${s.toString().padStart(2,"0")}</div>
      <div class="track"><div class="fill" style="width:${pct}%;background:${t.left===0?"#4ade80":"#fff"}"></div></div>
    </div>`;
}

function dayStats(di,w){
  const dd=PROGRAM.days[di].weeks[w];
  const total=dd.blocks.reduce((s,b)=>s+b.exercises.length,0);
  const done=dd.blocks.reduce((s,b,bi)=>s+b.exercises.filter((_,ei)=>state.checked[`w${w}-d${di}-b${bi}-e${ei}`]).length,0);
  return{total,done,complete:done>=total&&total>0};
}

function render(){
  // Nav
  const views=["workout","progress","nutrition","guide"];
  document.getElementById("nav").innerHTML=views.map(v=>
    `<button class="${state.view===v?"active":""}" onclick="state.view='${v}';render()">${v}</button>`
  ).join("");
  views.forEach(v=>{
    const el=document.getElementById(v+"-section");
    el.classList.toggle("active",state.view===v);
  });
  if(state.view==="workout")renderWorkout();
  else if(state.view==="progress")renderProgress();
  else if(state.view==="nutrition")renderNutrition();
  else if(state.view==="guide")renderGuide();
}

function renderWorkout(){
  const w=state.week,d=state.day,dayData=PROGRAM.days[d],weekData=dayData.weeks[w];
  const isStr=dayData.type==="strength";
  const totalEx=PROGRAM.days.reduce((s,dd)=>s+dd.weeks[w].blocks.reduce((s2,b)=>s2+b.exercises.length,0),0);
  const doneEx=Object.keys(state.checked).filter(k=>k.startsWith(`w${w}-`)&&state.checked[k]).length;
  const pct=totalEx>0?Math.round((doneEx/totalEx)*100):0;

  let h="";
  // Weeks
  h+=`<div class="weeks">${["Week 1","Week 2","Week 3","Week 4"].map((l,i)=>
    `<button class="${w===i?"active":""}" onclick="state.week=${i};render()">${l}</button>`
  ).join("")}</div>`;

  // Progress
  h+=`<div class="progress-bar"><div class="row"><span class="mono" style="font-size:11px;color:#bbb">Week progress</span><span class="mono" style="font-size:12px;font-weight:600">${pct}%</span></div><div class="track"><div class="fill" style="width:${pct}%;background:${pct===100?"#2d8a4e":"#1a1a1a"}"></div></div></div>`;

  // Days
  h+=`<div class="days">${PROGRAM.days.map((dd,di)=>{
    const s=dayStats(di,w);
    return `<button class="${d===di?"active":""} ${s.complete?"done":""}" onclick="state.day=${di};render()"><span style="font-size:8px;display:block;opacity:0.4">${dd.type==="strength"?"◆":"●"}</span><span style="display:block">${dd.label}</span><span class="mono" style="font-size:9px;color:${s.complete?"#2d8a4e":"#ccc"}">${s.done}/${s.total}</span></button>`;
  }).join("")}</div>`;

  // Warmup
  h+=`<div class="warmup"><span class="label">Warmup</span>${weekData.warmup}</div>`;

  // Blocks
  weekData.blocks.forEach((block,bi)=>{
    h+=`<div class="block"><div class="block-title">${block.title}</div>`;
    block.exercises.forEach((ex,ei)=>{
      const key=`w${w}-d${d}-b${bi}-e${ei}`;
      const done=state.checked[key];
      const wt=state.weights[key];
      const lastKey=key.replace(/^w\d/,m=>`w${(parseInt(m[1])-1+4)%4}`);
      const lastWt=state.weights[lastKey];
      h+=`<div class="exercise ${done?"checked":""}" onclick="toggleEx('${key}',${block.rest})">
        <div class="checkbox ${done?"on":""}">${done?'<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 3.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':""}</div>
        <div class="ex-body">
          <div class="ex-top">
            <span class="ex-name ${done?"struck":""}">${ex.name}</span>
            <div class="ex-right">
              ${isStr?`<button class="wt-btn ${wt?"has":""}" onclick="event.stopPropagation();editWeight('${key}','${wt||""}','${lastWt||""}')">${wt?wt+" lbs":lastWt?"Last: "+lastWt:"+ wt"}</button>`:""}
              <span class="ex-sets">${ex.sets}</span>
            </div>
          </div>
          ${ex.note?`<div class="ex-note">${ex.note}</div>`:""}
        </div>
      </div>`;
    });
    h+=`</div>`;
  });

  if(weekData.finisher) h+=`<div class="finisher"><span class="label">Finisher</span>${weekData.finisher}</div>`;
  h+=`<button class="reset-btn" onclick="resetWeek()">Reset Week ${w+1} progress</button>`;
  document.getElementById("workout-section").innerHTML=h;
}

function toggleEx(key,rest){
  state.checked[key]=!state.checked[key];
  if(!state.checked[key])delete state.checked[key];
  save();render();
  if(state.checked[key]&&rest>0)startTimer(rest);
}

function editWeight(key,current,last){
  const val=prompt("Enter weight (lbs):",current||last||"");
  if(val!==null&&val.trim()){state.weights[key]=val.trim();save();render();}
}

function resetWeek(){
  if(!confirm("Reset Week "+(state.week+1)+" progress?"))return;
  const prefix=`w${state.week}-`;
  Object.keys(state.checked).forEach(k=>{if(k.startsWith(prefix))delete state.checked[k];});
  Object.keys(state.weights).forEach(k=>{if(k.startsWith(prefix))delete state.weights[k];});
  save();render();
}

function renderProgress(){
  let h=`<div class="bg-section"><div class="stitle">Log today's weigh-in</div><div class="log-input"><input type="number" inputmode="decimal" id="bw-input" placeholder="e.g. 228"><span style="font-size:13px;color:#aaa">lbs</span><button class="log-btn" onclick="addBodyWeight()">Log</button></div></div>`;

  if(state.bodyLog.length>0){
    const bl=state.bodyLog,last=bl[bl.length-1],first=bl[0];
    const change=Math.round((first.weight-last.weight)*10)/10;
    const toGoal=Math.round(last.weight-210);

    // Chart
    if(bl.length>=2){
      const min=Math.min(...bl.map(d=>d.weight))-2,max=Math.max(...bl.map(d=>d.weight))+2;
      const cw=280,ch=100,px=24,py=12;
      const pts=bl.map((d,i)=>({x:px+(i/(bl.length-1))*(cw-2*px),y:py+((max-d.weight)/(max-min))*(ch-2*py)}));
      const line=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
      const goalY=py+((max-210)/(max-min))*(ch-2*py);
      const goalIn=210>=min&&210<=max;
      h+=`<div style="margin-bottom:20px"><svg viewBox="0 0 ${cw} ${ch}" style="width:100%;max-width:320px;height:auto;display:block;margin:0 auto">`;
      if(goalIn)h+=`<line x1="${px}" y1="${goalY}" x2="${cw-px}" y2="${goalY}" stroke="#4ade80" stroke-width="1" stroke-dasharray="4,3"/><text x="${cw-px+4}" y="${goalY+3}" fill="#4ade80" font-size="9" font-family="'DM Mono',monospace">210</text>`;
      h+=`<path d="${line}" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
      pts.forEach((p,i)=>{h+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#1a1a1a"/><text x="${p.x}" y="${p.y-8}" text-anchor="middle" fill="#888" font-size="9" font-family="'DM Mono',monospace">${bl[i].weight}</text>`;});
      h+=`</svg></div>`;
    }

    h+=`<div class="stat3"><div class="item"><div class="num">${last.weight}</div><div class="lbl">Current</div></div><div class="item"><div class="num" style="color:${change>0?"#2d8a4e":"#e24b4a"}">${change>0?"-":"+"}</span>${Math.abs(change)}</div><div class="lbl">Change</div></div><div class="item"><div class="num">${toGoal}</div><div class="lbl">To goal</div></div></div>`;

    h+=`<div style="margin-bottom:20px"><div class="stitle" style="font-family:'DM Mono',monospace;font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">History</div>`;
    [...bl].reverse().slice(0,10).forEach(e=>{
      h+=`<div class="history-row"><span class="mono" style="color:#999">${e.date}</span><span style="font-weight:500">${e.weight} lbs</span></div>`;
    });
    h+=`</div>`;
    h+=`<button class="reset-btn" onclick="if(confirm('Clear all weigh-in history?')){state.bodyLog=[];save();render();}">Clear history</button>`;
  } else {
    h+=`<div class="empty"><div class="icon">◎</div><p>Log your first weigh-in to start tracking your 230 → 210 journey</p></div>`;
  }
  document.getElementById("progress-section").innerHTML=h;
}

function addBodyWeight(){
  const input=document.getElementById("bw-input");
  const w=parseFloat(input.value);
  if(isNaN(w)||w<50||w>500)return;
  const today=new Date().toISOString().slice(0,10);
  state.bodyLog=state.bodyLog.filter(e=>e.date!==today);
  state.bodyLog.push({date:today,weight:w});
  state.bodyLog.sort((a,b)=>a.date.localeCompare(b.date));
  save();render();
}

function renderNutrition(){
  document.getElementById("nutrition-section").innerHTML=`
    <div class="bg-section">
      <div class="stitle">Your targets</div>
      <div class="card-grid">
        <div class="stat-card"><div class="label">Calories</div><div class="val">2,000–2,200</div><div class="sub">~500 deficit</div></div>
        <div class="stat-card"><div class="label">Protein</div><div class="val">180–200g</div><div class="sub">~1g/lb target BW</div></div>
        <div class="stat-card"><div class="label">Carbs</div><div class="val">180–220g</div><div class="sub">fuel your training</div></div>
        <div class="stat-card"><div class="label">Fat</div><div class="val">55–70g</div><div class="sub">hormonal health</div></div>
      </div>
    </div>
    <div style="margin-bottom:20px">
      <h3>How to hit these numbers</h3>
      <p class="prose">At 230 lbs with your activity level, maintenance is roughly 2,500–2,700 cal/day. A 500 cal deficit gets you to ~1 lb/week loss, reaching 210 in about 20 weeks. Sustainable pace that preserves muscle.</p>
      <p class="prose">Protein is the non-negotiable — 180g minimum. It preserves lean mass during a cut, keeps you full, and supports recovery. Spread it across 4 meals.</p>
    </div>
    <div style="margin-bottom:20px">
      <h3>Simple meal framework</h3>
      <div class="meal"><div class="name">Meal 1 (pre or post workout)</div><div class="desc">3 eggs + oats + banana — ~450 cal, 25g protein</div></div>
      <div class="meal"><div class="name">Meal 2 (lunch)</div><div class="desc">8oz chicken breast + rice + veggies — ~550 cal, 50g protein</div></div>
      <div class="meal"><div class="name">Meal 3 (afternoon)</div><div class="desc">Greek yogurt + protein scoop + berries — ~350 cal, 45g protein</div></div>
      <div class="meal"><div class="name">Meal 4 (dinner)</div><div class="desc">8oz salmon or lean beef + sweet potato + greens — ~600 cal, 50g protein</div></div>
    </div>
    <div class="dark-box"><strong>Key rules: </strong>Protein at every meal. Drink 100+ oz water daily. Don't cut carbs on training days. On rest days, drop carbs slightly and increase veggies. One flexible meal per week keeps you sane.</div>`;
}

function renderGuide(){
  document.getElementById("guide-section").innerHTML=`
    <div style="margin-bottom:20px">
      <h3>How the rotation works</h3>
      <p class="prose">The program cycles through 4 weeks. Each week uses the same 5-day structure (push / HIIT / legs / endurance / pull) but swaps exercises to target muscles from different angles, prevent adaptation, and keep things fresh. After week 4, loop back to week 1 with heavier weights.</p>
    </div>
    <div style="margin-bottom:20px">
      <h3>Scheduling around 12-hr shifts</h3>
      <p class="prose">These are a rotation, not tied to specific weekdays. On work days, slot in a 30-min strength or HIIT session before or after your shift. Save the endurance day for your off day when you have more room to breathe.</p>
      <p class="prose">If you miss a day, just pick up where you left off. Don't double up. Consistency over perfection.</p>
    </div>
    <div style="margin-bottom:20px">
      <h3>Progression plan</h3>
      <div class="prog-row"><div class="rule">Strength days</div><div class="detail">Add 5 lbs to Smith lifts or 1-2 reps per set every 2 weeks. When you hit the top of a rep range (e.g., 10 in 8-10), increase weight and drop back to 8.</div></div>
      <div class="prog-row"><div class="rule">Cardio HIIT</div><div class="detail">Improve your 500m row time by 1-2 seconds each cycle, or add 1 round to circuits.</div></div>
      <div class="prog-row"><div class="rule">Endurance</div><div class="detail">Extend duration by 5 min every 2 weeks, up to ~45 min. Then increase intensity slightly.</div></div>
      <div class="prog-row"><div class="rule">Deload</div><div class="detail">Every 4th cycle (after 16 weeks), take a lighter week — same exercises, 50% weight, no finishers.</div></div>
    </div>
    <div style="margin-bottom:20px">
      <h3>Rest period cheat sheet</h3>
      <div class="rest-grid">
        <div class="rest-card"><div class="time">60s</div><div class="type">Supersets</div><div class="note">Between rounds</div></div>
        <div class="rest-card"><div class="time">75-90s</div><div class="type">Heavy compounds</div><div class="note">Squats, bench</div></div>
        <div class="rest-card"><div class="time">0s</div><div class="type">Core circuits</div><div class="note">No rest between</div></div>
      </div>
    </div>
    <div class="dark-box"><strong>RPE guide: </strong>RPE 5-6 = can talk in sentences (endurance days). RPE 7-8 = few words (strength working sets). RPE 9 = one more rep left (last set of compounds). Never train to absolute failure — leave 1 in the tank.</div>`;
}

// Init
load();
render();

// Register service worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}

// Prevent double-tap zoom on iOS
document.addEventListener('dblclick',e=>e.preventDefault());
</script>
</body>
</html>
